name: CI
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Build app
        run: npm run build

  test_unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Run Vitest
        run: npx vitest run --reporter=verbose

  test_integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: Integration Tests (Playwright)
          path: reports-e2e/html/
          if-no-files-found: error

  deploy:
    name: Deploy (mock)
    runs-on: ubuntu-latest
    needs: [test_unit, test_integration]
    container:
      image: alpine:latest
    steps:
      - name: Mock deployment
        run: echo 'Mock deployment was successful!'

  e2e_prepare:
    name: Get Playwright Version
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      pw-version: ${{ steps.pw-version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install deps
        run: npm ci
      - name: Get Playwright version
        id: pw-version
        run: echo "version=$(npx playwright --version | cut -d' ' -f2)" >> $GITHUB_OUTPUT

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: e2e_prepare
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.e2e_prepare.outputs.pw-version }}-jammy
      options: --user 1001
    env:
      E2E_BASE_URL: https://spanish-cards.netlify.app/
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: npm ci
      - name: Run Playwright E2E
        run: npx playwright test
